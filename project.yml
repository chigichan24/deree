name: deree
options:
  bundleIdPrefix: com.chigichan24
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  groupSortPosition: top

packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: "1.25.0"

targets:
  deree:
    type: application
    platform: macOS
    sources: [deree]
    dependencies:
      - package: ComposableArchitecture
    settings:
      base:
        INFOPLIST_FILE: deree/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "6"
        SWIFT_STRICT_CONCURRENCY: complete
        PRODUCT_BUNDLE_IDENTIFIER: com.chigichan24.deree
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1

  dereeTests:
    type: bundle.unit-test
    platform: macOS
    sources: [dereeTests]
    settings:
      base:
        SWIFT_VERSION: "6"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: deree
