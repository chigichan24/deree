name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Cache Mint packages
        uses: actions/cache@v4
        with:
          path: ~/.mint
          key: mint-${{ hashFiles('Mintfile') }}

      - name: Install Mint & XcodeGen
        run: |
          brew install mint
          mint bootstrap

      - name: Generate Xcode project
        run: mint run xcodegen generate

      - name: Build and Test
        run: |
          xcodebuild -project deree.xcodeproj \
            -scheme dereeTests \
            -destination 'platform=macOS' \
            -skipMacroValidation \
            test
